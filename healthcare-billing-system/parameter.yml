key_value_replace:
  - find_key: $.destinations[?(@.name=="Eventhouse")].properties.workspaceId
    replace_value:
      _ALL_: "$workspace.$id"
    item_type: "Eventstream"
    item_name: "HealthcareBillingDataStream"
  - find_key: $.destinations[?(@.name=="Eventhouse")].properties.itemId
    replace_value:
      _ALL_: "$items.KQLDatabase.HealthcareBillingSystem.$id"
    item_type: "Eventstream"
    item_name: "HealthcareBillingDataStream"